<mat-card class="preview-card">
  <mat-card-header>
    <mat-icon mat-card-avatar aria-hidden="true">article</mat-icon>
    <mat-card-title>Resume Preview</mat-card-title>
    <mat-card-subtitle>{{ fileName() || 'Extracted PDF text will appear here' }}</mat-card-subtitle>
  </mat-card-header>

  <mat-card-content>
    @if (previewText()) {
      <pre>{{ previewText() }}</pre>
    } @else {
      <div class="empty-state">
        <mat-icon aria-hidden="true">text_snippet</mat-icon>
        <span>No resume uploaded yet.</span>
      </div>
    }
  </mat-card-content>
</mat-card>
